<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打印小票</title>
    <style>
        body {
            width: 80mm;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f9f9f9; /* 屏幕查看时的背景色 */
        }
        .header {
            text-align: center;
            border-bottom: 1px dashed #000;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }
        .header h2 { margin: 0; font-size: 18px; }
        .header p { margin: 2px 0; font-size: 12px; }    
        .receipt-info { margin-bottom: 10px; font-size: 13px; line-height: 1.4; }
        .receipt-info p { margin: 0; }
        
        /* 新增：收款方式样式 */
        .payment-method {
            margin: 10px 0;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .payment-method select {
            padding: 2px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .total-section { margin-bottom: 15px; font-size: 14px; font-weight: bold; }
        .item-label { font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #eee; }
        .item-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        
        .footer {
            text-align: center;
            font-size: 12px;
            border-top: 1px dashed #000;
            padding-top: 10px;
            margin-top: 10px;
        }
        
        /* 按钮组样式 */
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-direction: column;
        }
        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            color: white;
        }
        .btn-print { background-color: #007bff; }
        .btn-summary { background-color: #28a745; text-decoration: none; text-align: center; display: block; box-sizing: border-box;}
        
        @media print {
            body { background-color: #fff; }
            .btn-group, .payment-method { display: none !important; }
            .footer { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>PERSATUAN MIAO LI TANG SIBU</h2>
        <p>Tel: 013980446 (寺)</p>
        <p>JALAN PASAI SIONG OFF 25TH MILE</p>
        <p>JALAN OYA, SIBU SARAWAK</p>
        <h2>DONATION RECEIPT</h2>
    </div>

    <div id="receiptInfo" class="receipt-info"></div>

    <!-- 新增：收款方式选择 -->
    <div class="payment-method">
        <span><strong>收款方式:</strong></span>
        <select id="paymentType">
            <option value="现金">现金 (Cash)</option>
            <option value="转账">转账 (Transfer)</option>
        </select>
    </div>

    <div id="paperGoldSection" class="total-section"></div>
    <div id="donationSection" class="total-section"></div>

    <div class="footer">
        <p>愿一切吉祥如意，功德圆满</p>
        <p id="footerDate"></p>
    </div>

    <!-- 操作按钮 -->
    <div class="btn-group">
        <button id="printBtn" class="btn btn-print">🖨️ 确认打印</button>
        <a href="summary.html" class="btn btn-summary">📊 查看每日汇总</a>
    </div>

    <script>
        // 定义缓存键名
        const STORAGE_KEY = 'TS_daily_receipts_cache';

        window.addEventListener("message", function (event) {
            const data = JSON.parse(event.data);
            
            // 1. 填充基本信息
            const receiptNumber = data.receiptNumber || "未生成";
            const mainName = data.mainName || "未填写";
            const phoneNumber = data.phoneNumber || "未填写";
            const now = new Date();
            const receiptDate = now.toLocaleString("zh-CN");

           document.getElementById("receiptInfo").innerHTML = `
    <div>
        <!-- 注意这里：给号码加了一个 span 标签，id="receiptNoDisplay" -->
        <p><strong>D/NO:</strong> <span id="receiptNoDisplay">${receiptNumber}</span></p>
        
        <p><strong>时间:</strong> ${receiptDate}</p>
        <p><strong>主祈者:</strong> ${mainName}</p>
        <p><strong>电话:</strong> ${phoneNumber}</p>    
    </div>
`;
            document.getElementById("footerDate").innerText = `打印日期: ${now.toLocaleDateString()}`;

            // 2. 计算金额
            let totalPaperGold = 0;
            let totalDonation = 0;
            (data.data || []).forEach(item => {
                totalPaperGold += (item.paperGold1 || 0) + (item.paperGold2 || 0) + (item.paperGold3 || 0) + (item.paperGold4 || 0) + (item.paperGold5 || 0);
                totalDonation += item.donation || 0;
            });
            const paperMoney = totalPaperGold * 3;
            const grandTotal = paperMoney + totalDonation;

            // 3. 渲染金额区域
            document.getElementById("paperGoldSection").innerHTML = `
                <div class="item-label">十四宝金</div>
                <div class="item-row"><span>纸金 ${totalPaperGold} 份 x RM 3.00</span><span>RM ${paperMoney.toFixed(2)}</span></div>
            `;
            document.getElementById("donationSection").innerHTML = `
                <div class="item-label">功德金 & 灯位</div>
                <div class="item-row"><span>总额</span><span>RM ${totalDonation.toFixed(2)}</span></div>
                <div class="item-row" style="margin-top: 8px; border-top: 1px dashed #000; padding-top:5px;">
                    <span style="font-size:16px;">总计</span>
                    <span style="font-size:16px;">RM ${grandTotal.toFixed(2)}</span>
                </div>
            `;

            // 4. 监听打印按钮（核心：实现“点击确认才生成正式单号”）
        document.getElementById("printBtn").addEventListener("click", () => {
            const paymentType = document.getElementById("paymentType").value;
            
            // --- 核心修改逻辑开始 ---
            
            // 1. 获取当前显示的号码
            const displaySpan = document.getElementById("receiptNoDisplay");
            let currentNo = displaySpan.innerText;

            // 2. 判断：如果是“未生成”或者空，向主窗口申请正式号码
            if (currentNo === "未生成" || !currentNo) {
                try {
                    // 调用主页面的 finalizeReceiptNumber 函数
                    const finalNo = window.opener.finalizeReceiptNumber();
                    
                    if (finalNo) {
                        currentNo = finalNo; // 更新变量
                        displaySpan.innerText = finalNo; // 更新页面上显示的号码
                        console.log("✅ 已生成正式单号: " + finalNo);
                    }
                } catch (e) {
                    console.error("❌ 获取单号失败:", e);
                    alert("系统错误：无法生成单号！");
                    return; // 停止执行
                }
            }

            // --- 核心修改逻辑结束 ---

            // 3. 构建要保存的数据对象 (使用最终确定的号码)
            const receiptRecord = {
                id: Date.now(), 
                receiptNumber: currentNo, // 使用更新后的号码
                mainName: mainName,
                phoneNumber: phoneNumber,
                amount: grandTotal,
                paymentType: paymentType, 
                date: now.toISOString(), 
                timestamp: now.getTime()
            };

            // 4. 保存到缓存
            saveToCache(receiptRecord);
            
            // 5. 执行打印
            window.print();
        });
    }); // 这个括号是结束 window.addEventListener("message"...
        // --- 缓存逻辑函数 ---
        function saveToCache(record) {
            // 1. 获取现有缓存
            let receipts = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            
            // 2. 添加新记录
            receipts.push(record);
            
            // 3. 清理过期数据 (保留24小时)
            const now = Date.now();
            const twentyFourHours = 24 * 60 * 60 * 1000;
            receipts = receipts.filter(r => (now - r.timestamp) < twentyFourHours);
            
            // 4. 存回 LocalStorage
            localStorage.setItem(STORAGE_KEY, JSON.stringify(receipts));
            console.log("✅ 小票已缓存:", record.receiptNumber);
        }
    </script>
</body>
</html>
