<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太岁光明灯登记</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding-bottom: 80px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }

        .card-header {
            background-color: #fff;
            border-bottom: 1px solid #f0f0f0;
            padding: 15px;
            font-weight: 600;
            color: #333;
            border-top-left-radius: 12px !important;
            border-top-right-radius: 12px !important;
        }

        .form-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #dee2e6;
            height: 45px;
        }

        .form-check-input {
            margin-top: 0.3em;
            width: 18px;
            height: 18px;
        }

        /* --- 核心修改：让是/否选项横向排列 --- */
        .radio-group {
            display: flex;
            gap: 20px; /* 选项之间的间距 */
            align-items: center;
            padding-top: 5px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            cursor: pointer;
        }

        .radio-item .form-check-input {
            margin-right: 6px;
            margin-top: 0; /* 修正对齐 */
        }
        /* ------------------------------------ */

        .btn-primary {
            background-color: #d32f2f;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            height: 50px;
            font-size: 1.1rem;
        }

        .btn-primary:hover {
            background-color: #b71c1c;
        }

        .btn-secondary {
            background-color: #757575;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            height: 50px;
            font-size: 1.1rem;
        }

        .prayer-item {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff4d4f;
            background: none;
            border: none;
            font-size: 1.2rem;
            padding: 0;
        }

        .section-title {
            font-size: 0.9rem;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid #ffebee;
            display: flex;
            align-items: center;
        }
        
        .section-title i {
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="page-header">
        <i class="bi bi-lightning-charge-fill"></i> 太岁光明灯登记
    </div>

    <!-- 搜索区域 -->
    <div class="card">
        <div class="card-body">
            <div class="mb-3">
                <label for="phone" class="form-label">手机号查询</label>
                <div class="input-group">
                    <input type="tel" class="form-control" id="phone" placeholder="请输入登记的手机号">
                    <button class="btn btn-primary" type="button" onclick="searchPhone()" style="width: 100px;">
                        <i class="bi bi-search"></i> 查询
                    </button>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="startNewEntry()">
                <i class="bi bi-plus-lg"></i> 新建登记
            </button>
        </div>
    </div>

    <!-- 登记表单 (默认隐藏) -->
    <div id="entryForm" style="display: none;">
        
        <!-- 基本信息卡片 -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-vcard"></i> 基本信息
            </div>
            <div class="card-body">
                <input type="hidden" id="id">
                <div class="mb-3">
                    <label for="mainName" class="form-label">主家姓名</label>
                    <input type="text" class="form-control" id="mainName" placeholder="请输入主家姓名">
                </div>
                <div class="mb-3">
                    <label for="mainPhone" class="form-label">联系电话</label>
                    <input type="tel" class="form-control" id="mainPhone" placeholder="请输入联系电话">
                </div>
            </div>
        </div>

        <!-- 祈福者名单卡片 -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-people"></i> 祈福者名单</span>
                <button class="btn btn-sm btn-outline-primary" onclick="addPrayer()">
                    <i class="bi bi-plus"></i> 添加
                </button>
            </div>
            <div class="card-body" id="prayerList">
                <!-- 动态生成的祈福者列表 -->
            </div>
        </div>

        <!-- 核心修改：这里删除了原本的“备注信息”卡片 -->

        <!-- 底部操作按钮 -->
        <div class="fixed-bottom bg-white p-3 shadow-sm" style="left:0; right:0; bottom:0; z-index: 1000;">
            <button class="btn btn-primary" onclick="saveData()">
                <i class="bi bi-save"></i> 保存资料
            </button>
        </div>
    </div>

    <script>
        // 全局变量存储当前查询到的所有记录
        let searchResults = [];

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化一位祈福者
            addPrayer();
        });

        // 查询手机号
        async function searchPhone() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                alert('请输入手机号');
                return;
            }

            try {
                const response = await fetch(`/api/entry?phone=${phone}`);
                const data = await response.json();

                if (data.success) {
                    if (data.data && data.data.length > 0) {
                        searchResults = data.data;
                        if (data.data.length === 1) {
                            // 只有一条记录，直接渲染
                            renderForm(data.data[0]);
                        } else {
                            // 多条记录，让用户选择
                            selectEntry(data.data);
                        }
                    } else {
                        // 无记录，新建
                        if(confirm('未找到该手机号的记录，是否新建登记？')) {
                            startNewEntry();
                        }
                    }
                } else {
                    alert('查询失败: ' + data.message);
                }
            } catch (error) {
                console.error('查询错误:', error);
                alert('网络错误，查询失败');
            }
        }

        // 选择记录（多条时）
        function selectEntry(entries) {
            let options = '找到多条记录，请选择：\n';
            entries.forEach((entry, index) => {
                options += `${index + 1}. ${entry.mainName} - ${entry.mainPhone}\n`;
            });
            options += '\n输入序号选择，或取消新建';

            const choice = prompt(options);
            if (choice) {
                const index = parseInt(choice) - 1;
                if (index >= 0 && index < entries.length) {
                    renderForm(entries[index]);
                } else {
                    startNewEntry();
                }
            }
        }

        // 开始新登记
        function startNewEntry() {
            document.getElementById('entryForm').style.display = 'block';
            document.getElementById('id').value = '';
            document.getElementById('mainName').value = '';
            document.getElementById('mainPhone').value = document.getElementById('phone').value;
            
            // 清空并重新添加一个祈福者
            const list = document.getElementById('prayerList');
            list.innerHTML = '';
            addPrayer();
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }

        // 渲染表单
        function renderForm(entry) {
            document.getElementById('entryForm').style.display = 'block';
            document.getElementById('id').value = entry.id || '';
            document.getElementById('mainName').value = entry.mainName || '';
            document.getElementById('mainPhone').value = entry.mainPhone || '';

            // 渲染祈福者列表
            const list = document.getElementById('prayerList');
            list.innerHTML = ''; // 清空现有

            if (entry.prayers && entry.prayers.length > 0) {
                entry.prayers.forEach(prayer => {
                    addPrayer(prayer);
                });
            } else {
                addPrayer();
            }
        }

        // 添加祈福者
        function addPrayer(data = {}) {
            const list = document.getElementById('prayerList');
            const id = 'prayer-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            
            const div = document.createElement('div');
            div.className = 'prayer-item';
            div.id = id;
            
            // 检查是否是编辑模式，如果是，使用传入的数据，否则使用默认值
            const name = data.name || '';
            const zodiac = data.zodiac || '';
            
            // 核心逻辑：生成HTML，注意 class="radio-group" 和 "radio-item" 用于CSS控制横排
            div.innerHTML = `
                <button type="button" class="remove-btn" onclick="removePrayer('${id}')">&times;</button>
                <div class="mb-3">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-control name-input" value="${name}" placeholder="请输入姓名">
                </div>
                <div class="mb-3">
                    <label class="form-label">生肖</label>
                    <select class="form-select zodiac-input">
                        <option value="">请选择</option>
                        <option value="鼠" ${zodiac === '鼠' ? 'selected' : ''}>鼠</option>
                        <option value="牛" ${zodiac === '牛' ? 'selected' : ''}>牛</option>
                        <option value="虎" ${zodiac === '虎' ? 'selected' : ''}>虎</option>
                        <option value="兔" ${zodiac === '兔' ? 'selected' : ''}>兔</option>
                        <option value="龙" ${zodiac === '龙' ? 'selected' : ''}>龙</option>
                        <option value="蛇" ${zodiac === '蛇' ? 'selected' : ''}>蛇</option>
                        <option value="马" ${zodiac === '马' ? 'selected' : ''}>马</option>
                        <option value="羊" ${zodiac === '羊' ? 'selected' : ''}>羊</option>
                        <option value="猴" ${zodiac === '猴' ? 'selected' : ''}>猴</option>
                        <option value="鸡" ${zodiac === '鸡' ? 'selected' : ''}>鸡</option>
                        <option value="狗" ${zodiac === '狗' ? 'selected' : ''}>狗</option>
                        <option value="猪" ${zodiac === '猪' ? 'selected' : ''}>猪</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">太岁</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="taisui_${id}" value="1" ${data.taisui == 1 ? 'checked' : ''}> 是
                        </label>
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="taisui_${id}" value="0" ${!data.taisui || data.taisui == 0 ? 'checked' : ''}> 否
                        </label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">光明灯</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="guangming_${id}" value="1" ${data.guangming == 1 ? 'checked' : ''}> 是
                        </label>
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="guangming_${id}" value="0" ${!data.guangming || data.guangming == 0 ? 'checked' : ''}> 否
                        </label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">长生禄</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="changsheng_${id}" value="1" ${data.changsheng == 1 ? 'checked' : ''}> 是
                        </label>
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="changsheng_${id}" value="0" ${!data.changsheng || data.changsheng == 0 ? 'checked' : ''}> 否
                        </label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">文昌</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="wenchang_${id}" value="1" ${data.wenchang == 1 ? 'checked' : ''}> 是
                        </label>
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="wenchang_${id}" value="0" ${!data.wenchang || data.wenchang == 0 ? 'checked' : ''}> 否
                        </label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">十六罗汉</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="luohan_${id}" value="1" ${data.luohan == 1 ? 'checked' : ''}> 是
                        </label>
                        <label class="radio-item">
                            <input class="form-check-input" type="radio" name="luohan_${id}" value="0" ${!data.luohan || data.luohan == 0 ? 'checked' : ''}> 否
                        </label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">安奉功德金</label>
                    <input type="number" class="form-control gongde-input" value="${data.gongde || ''}" placeholder="选填">
                </div>
            `;
            
            list.appendChild(div);
        }

        // 删除祈福者
        function removePrayer(id) {
            const el = document.getElementById(id);
            if (el) {
                el.remove();
            }
        }

        // 保存数据
        async function saveData() {
            const id = document.getElementById('id').value;
            const mainName = document.getElementById('mainName').value.trim();
            const mainPhone = document.getElementById('mainPhone').value.trim();

            if (!mainName || !mainPhone) {
                alert('请填写主家姓名和电话');
                return;
            }

            // 收集祈福者数据
            const prayerItems = document.querySelectorAll('.prayer-item');
            const prayers = [];
            
            for (let item of prayerItems) {
                const name = item.querySelector('.name-input').value.trim();
                if (!name) continue; // 跳过空姓名的项
                
                const zodiac = item.querySelector('.zodiac-input').value;
                const gongde = item.querySelector('.gongde-input').value;
                
                // 获取单选框的值
                const taisui = item.querySelector('input[name^="taisui_"]:checked')?.value || 0;
                const guangming = item.querySelector('input[name^="guangming_"]:checked')?.value || 0;
                const changsheng = item.querySelector('input[name^="changsheng_"]:checked')?.value || 0;
                const wenchang = item.querySelector('input[name^="wenchang_"]:checked')?.value || 0;
                const luohan = item.querySelector('input[name^="luohan_"]:checked')?.value || 0;
                
                prayers.push({
                    name,
                    zodiac,
                    taisui: parseInt(taisui),
                    guangming: parseInt(guangming),
                    changsheng: parseInt(changsheng),
                    wenchang: parseInt(wenchang),
                    luohan: parseInt(luohan),
                    gongde: gongde ? parseFloat(gongde) : 0
                });
            }

            if (prayers.length === 0) {
                alert('请至少添加一位祈福者');
                return;
            }

            const data = {
                id: id,
                mainName,
                mainPhone,
                prayers
            };

            try {
                const response = await fetch('/api/entry', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (result.success) {
                    alert('保存成功！');
                    // 可以选择刷新页面或重置表单
                    // location.reload();
                } else {
                    alert('保存失败: ' + result.message);
                }
            } catch (error) {
                console.error('保存错误:', error);
                alert('网络错误，保存失败');
            }
        }
    </script>
</body>
</html>
