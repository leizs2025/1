<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太岁光明灯登记</title>
    <!-- 引入 Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- 手机端基础设置 --- */
        body {
            background-color: #f8f9fa;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            padding-bottom: 80px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* --- 输入框和按钮优化 --- */
        .form-control, .form-select {
            height: 40px; /* 稍微调小一点以适应更多字段 */
            font-size: 14px;
            border-radius: 6px;
            background-color: #fff;
        }

        .btn {
            height: 45px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
        }

        /* 只读输入框样式 */
        .form-control[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            padding: 15px;
            background: #fff;
        }

        /* --- 祈福者卡片样式 --- */
        .prayer-card {
            position: relative;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            color: #dc3545;
            font-size: 20px;
            line-height: 1;
            z-index: 10;
        }

        .form-label {
            font-size: 13px;
            margin-bottom: 2px;
            white-space: nowrap;
        }

        .hidden { display: none !important; }
        
        /* 改进的radio-group样式 - 确保水平排列 */
        .radio-group {
            display: flex;
            gap: 5px;
            align-items: center;
            background-color: #f8f9fa; /* 添加浅色背景 */
            border: 1px solid #ccc; /* 轻微边框 */
            border-radius: 6px;
            padding: 5px;
            min-height: 35px;
        }
        .radio-group .form-check {
            margin: 0 !important;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
        }
        .radio-group .form-check-input {
            margin-right: 4px;
            border: 2px solid #333 !important; /* 黑色边框 */
            background-color: #fff !important;
        }
        .radio-group .form-check-input:checked {
            background-color: #333 !important;
            border-color: #333 !important;
        }
        .radio-group .form-check-label {
            font-size: 11px;
            margin: 0;
            flex: 1;
            text-align: center;
        }
        
        /* 特别为祈福者卡片中的单选按钮调整 */
        .prayer-card .radio-group {
            display: flex;
            gap: 5px;
            min-height: 35px;
            align-items: center;
            background-color: #f8f9fa;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 5px;
        }
        .prayer-card .radio-group .form-check {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 !important;
            padding: 2px;
        }
        .prayer-card .radio-group .form-check-label {
            font-size: 11px;
            margin: 0;
            padding: 2px;
        }
        
        /* === 修复"出轨"问题的关键CSS === */
        .prayer-card .form-check-input[type="radio"] {
            width: 18px !important;
            height: 18px !important;
            min-width: 18px !important;
            min-height: 18px !important;
            border: 2px solid #333 !important;
            background-color: #fff !important;
            flex-shrink: 0; /* 防止被压缩 */
            margin: 0 !important;
            vertical-align: middle;
        }
        .prayer-card .form-check-input[type="radio"]:checked {
            background-color: #333 !important;
            border-color: #333 !important;
        }
        .prayer-card .form-check-label {
            font-size: 12px;
            margin: 0 0 0 4px; /* 左侧留空隙 */
            line-height: 1.4;
        }
        
        /* 查询结果提示样式 */
        .search-result-info {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            background-color: #e7f3ff;
            border-radius: 6px;
            border-left: 4px solid #007bff;
        }
        
        /* 年份选择器样式 */
        .year-selector {
            margin-top: 10px;
            padding: 10px;
            background-color: #fff9db;
            border-radius: 6px;
            border: 1px solid #ffeaa7;
        }
    </style>
</head>
<body>

    <!-- 顶部标题 -->
    <h5 class="page-header">🙏 太岁光明灯登记</h5>

    <!-- 搜索与操作区 - 移除"开始登记"按钮 -->
    <div class="card">
        <div class="mb-3">
            <input type="text" id="searchInput" class="form-control mb-2" placeholder="输入手机号查询资料" inputmode="tel">
            <button onclick="searchPhone()" class="btn btn-primary w-100">🔍 查询资料</button>
        </div>
    </div>

    <!-- 查询结果提示信息 -->
    <div id="searchResultInfo" class="hidden"></div>

    <!-- 结果选择器 -->
    <div id="resultSelector" class="mb-3"></div>

    <!-- 登记表单区域 -->
    <div id="adminForm" class="hidden">
        
        <!-- 基本信息 -->
        <div class="card">
            <h6 class="border-bottom pb-2 mb-3">📝 基本信息</h6>
            
            <!-- 新增：年份选择器 -->
            <div class="year-selector mb-3">
                <label class="form-label">📅 报名太岁年份</label>
                <select id="registrationYear" class="form-select" onchange="updatePhoneWithYearPrefix()">
                    <!-- JS 动态生成年份选项 -->
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">主家姓名</label>
                <input type="text" id="mainName" class="form-control" placeholder="姓名">
            </div>
            <div class="mb-3">
                <label class="form-label">手机号码</label>
                <input type="tel" id="phoneNumber" class="form-control" placeholder="用于查询" inputmode="tel" readonly>
            </div>
        </div>

        <!-- 祈福者列表 -->
        <div class="card">
            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                <h6 class="m-0">🙏 祈福者名单</h6>
                <button onclick="addPrayer()" class="btn btn-sm btn-outline-primary">+ 添加</button>
            </div>
            <div id="prayersContainer">
                <!-- JS 动态生成 -->
            </div>
        </div>

        <!-- 底部保存按钮 -->
        <div class="d-grid gap-2 mb-5">
            <button onclick="saveChanges()" class="btn btn-danger btn-lg">💾 保存资料</button>
            <button onclick="cancelEdit()" class="btn btn-secondary">取消</button>
        </div>
    </div>

    <!-- === JS 逻辑 === -->
    <script>
        // ⚠️ 请在这里替换你的 Cloudflare Worker 地址
        const API_URL = "https://你的-worker-domain.workers.dev";

        let fullData = [];
        let selectedEntry = null;
        let currentRegistrationYear = null; // 当前选择的年份
        let originalPhoneNumber = null; // 存储原始手机号（不带前缀）

        // 获取当前年份
        const currentYear = new Date().getFullYear();

        // 初始化年份选择器
        function initYearSelector() {
            const yearSelect = document.getElementById("registrationYear");
            yearSelect.innerHTML = ""; // 清空现有选项
            
            // 生成从今年开始往后10年的选项
            for (let year = currentYear; year <= currentYear + 10; year++) {
                const option = document.createElement("option");
                option.value = year;
                option.textContent = year + "年";
                if (year === currentYear) {
                    option.selected = true; // 默认选中今年
                    currentRegistrationYear = year;
                }
                yearSelect.appendChild(option);
            }
        }

        // 验证马来西亚手机号格式
        function isValidMalaysianPhone(phone) {
            if (!phone) return false;
            
            // 移除所有非数字字符
            const cleanPhone = phone.replace(/\D/g, '');
            
            // 马来西亚手机号格式：以0开头，总长度10-11位
            // 例如：0123456789 (10位) 或 01234567890 (11位)
            return /^0\d{9,10}$/.test(cleanPhone);
        }

        // 从带前缀的手机号中提取真实手机号（适用于马来西亚格式）
        function extractRealPhone(phoneWithPrefix) {
            if (!phoneWithPrefix) return phoneWithPrefix;
            
            // 如果长度大于11且第一位是数字，则认为是年份前缀
            // 马来西亚手机号：0 + 9-10位数字 = 10-11位
            // 加上前缀后：1位年份 + 0 + 9-10位 = 11-12位
            if (phoneWithPrefix.length > 11 && /^[0-9]$/.test(phoneWithPrefix.charAt(0))) {
                const withoutPrefix = phoneWithPrefix.substring(1); // 去掉第一位前缀
                
                // 验证剩余部分是否符合马来西亚手机号格式
                if (isValidMalaysianPhone(withoutPrefix)) {
                    return withoutPrefix;
                }
            }
            
            // 如果不符合前缀规则，但本身是有效手机号，直接返回
            if (isValidMalaysianPhone(phoneWithPrefix)) {
                return phoneWithPrefix;
            }
            
            return phoneWithPrefix;
        }

        // 为手机号添加前缀（适用于马来西亚格式）
        function addPhonePrefix(phone, year) {
            if (!phone) return phone;
            
            const yearLastDigit = year % 10; // 获取年份最后一位数字
            const realPhone = extractRealPhone(phone); // 先清洗一次
            
            // 验证是否是有效的马来西亚手机号
            if (isValidMalaysianPhone(realPhone)) {
                return yearLastDigit + realPhone; // 添加前缀
            }
            
            return phone; // 如果不是有效手机号，返回原值
        }

        // 更新手机号显示（添加年份前缀）
        function updatePhoneWithYearPrefix() {
            const phoneInput = document.getElementById("phoneNumber");
            const yearSelect = document.getElementById("registrationYear");
            const selectedYear = parseInt(yearSelect.value);
            
            if (!selectedYear || !phoneInput.value) return;
            
            currentRegistrationYear = selectedYear;
            const yearLastDigit = selectedYear % 10; // 获取年份最后一位数字
            
            // 获取原始手机号（不带前缀）
            const realPhone = extractRealPhone(phoneInput.value);
            
            // 保存原始手机号以便后续使用
            originalPhoneNumber = realPhone;
            
            // 添加新前缀并更新显示
            const newPhone = addPhonePrefix(realPhone, selectedYear);
            phoneInput.value = newPhone;
        }

        // 页面加载时初始化
        document.addEventListener("DOMContentLoaded", function() {
            initYearSelector();
        });

        // 1. 查询功能（核心逻辑：有记录则编辑，无记录则新建）
        window.searchPhone = function () {
            const keyword = document.getElementById("searchInput").value.trim();
            if (!keyword) return alert("请输入手机号！");

            // 验证手机号格式
            if (!isValidMalaysianPhone(keyword)) {
                alert("请输入有效的马来西亚手机号（以0开头，共10-11位数字）");
                return;
            }

            // 去掉查询关键词的前缀
            const realKeyword = extractRealPhone(keyword);

            fetch(`https://lucky-cloud-f9c3.gealarm2012.workers.dev?search=${encodeURIComponent(realKeyword)}`)
                .then(res => res.text())
                .then(text => {
                    let data;
                    try { data = JSON.parse(text); } 
                    catch (e) { 
                        alert("数据格式错误"); 
                        return; 
                    }

                    fullData = data;
                    const selector = document.getElementById("resultSelector");
                    const infoDiv = document.getElementById("searchResultInfo");
                    
                    // 清空之前的选择器和提示信息
                    selector.innerHTML = "";
                    infoDiv.classList.add("hidden");

                    if (data.length === 0) {
                        // 查无资料，直接开始新登记
                        infoDiv.innerHTML = `<div class="search-result-info">📱 未找到该手机号的资料，将为您创建新的登记表单</div>`;
                        infoDiv.classList.remove("hidden");
                        
                        setTimeout(() => {
                            startNewEntry(realKeyword); // 传入清洗后的手机号
                        }, 1000); // 延迟1秒再开始新登记，让用户看到提示
                        
                        return;
                    }

                    // 有资料的情况
                    if (data.length === 1) {
                        // 单条记录，直接编辑
                        infoDiv.innerHTML = `<div class="search-result-info">✅ 找到1笔资料，正在加载...</div>`;
                        infoDiv.classList.remove("hidden");
                        
                        selectedEntry = data[0];
                        setTimeout(() => {
                            renderForm();
                        }, 500); // 短暂延迟显示提示
                    } else {
                        // 多条记录，让用户选择
                        infoDiv.innerHTML = `<div class="search-result-info">📋 找到${data.length}笔资料，请选择要编辑的记录</div>`;
                        infoDiv.classList.remove("hidden");
                        
                        const select = document.createElement("select");
                        select.className = "form-select mb-2";
                        select.innerHTML = `<option selected disabled>--- 选择一笔资料 ---</option>`;
                        select.onchange = () => {
                            selectedEntry = fullData[select.selectedIndex - 1];
                            renderForm();
                            
                            // 隐藏选择器，显示表单
                            selector.classList.add("hidden");
                        };
                        data.forEach(item => {
                            const opt = document.createElement("option");
                            opt.textContent = `${item.mainName} (${item.phoneNumber})`;
                            select.appendChild(opt);
                        });
                        selector.appendChild(select);
                        
                        // 添加"新建记录"选项
                        const newRecordBtn = document.createElement("button");
                        newRecordBtn.className = "btn btn-outline-secondary w-100 mt-2";
                        newRecordBtn.textContent = "➕ 创建新记录";
                        newRecordBtn.onclick = () => {
                            selector.classList.add("hidden");
                            startNewEntry(realKeyword); // 使用清洗后的手机号
                        };
                        selector.appendChild(newRecordBtn);
                    }
                })
                .catch(err => {
                    console.error("查询出错:", err);
                    alert("查询出错：" + err.message);
                });
        };

        // 2. 开始新登记（带默认手机号）
        window.startNewEntry = function (defaultPhone = "") {
            selectedEntry = null;
            document.getElementById("adminForm").classList.remove("hidden");
            document.getElementById("adminForm").scrollIntoView({ behavior: 'smooth' });
            
            document.getElementById("mainName").value = "";
            
            // 保存原始手机号
            originalPhoneNumber = defaultPhone;
            
            // 为新记录添加年份前缀
            const yearSelect = document.getElementById("registrationYear");
            const selectedYear = parseInt(yearSelect.value);
            const phoneWithPrefix = addPhonePrefix(defaultPhone, selectedYear);
            document.getElementById("phoneNumber").value = phoneWithPrefix;
            
            const container = document.getElementById("prayersContainer");
            container.innerHTML = "";
            container.appendChild(createPrayerBlock({}, 1));
            
            // 隐藏选择器和提示信息
            document.getElementById("resultSelector").classList.add("hidden");
            document.getElementById("searchResultInfo").classList.add("hidden");
        };

        // 3. 添加祈福者
        window.addPrayer = function () {
            const container = document.getElementById("prayersContainer");
            if (container.children.length >= 15) return alert("最多添加 15 位！");
            container.appendChild(createPrayerBlock({}, container.children.length + 1));
        };

        // 4. 渲染表单数据
        function renderForm() {
            document.getElementById("adminForm").classList.remove("hidden");
            document.getElementById("adminForm").scrollIntoView({ behavior: 'smooth' });

            document.getElementById("mainName").value = selectedEntry.mainName || "";
            
            // 渲染时添加当前年份的前缀
            const yearSelect = document.getElementById("registrationYear");
            const selectedYear = parseInt(yearSelect.value);
            
            // 保存原始手机号（来自数据库的不带前缀的手机号）
            originalPhoneNumber = selectedEntry.phoneNumber;
            
            const phoneWithPrefix = addPhonePrefix(selectedEntry.phoneNumber, selectedYear);
            document.getElementById("phoneNumber").value = phoneWithPrefix;
            
            const container = document.getElementById("prayersContainer");
            container.innerHTML = "";
            const prayers = selectedEntry.data || [];
            
            if (prayers.length === 0) {
                container.appendChild(createPrayerBlock({}, 1));
            } else {
                prayers.forEach((item, idx) => {
                    if (item.name && item.name.trim()) {
                        container.appendChild(createPrayerBlock(item, idx + 1));
                    }
                });
            }
            
            // 隐藏选择器和提示信息
            document.getElementById("resultSelector").classList.add("hidden");
            document.getElementById("searchResultInfo").classList.add("hidden");
        }

        // 5. 保存资料（用户版 - 强制清空备注信息，同时去除手机号前缀）
        window.saveChanges = function () {
            const phoneWithPrefix = document.getElementById("phoneNumber").value.trim();
            const phoneWithoutPrefix = extractRealPhone(phoneWithPrefix); // 去掉前缀用于提交
            const name = document.getElementById("mainName").value.trim();
            
            if (!phoneWithoutPrefix || !name) return alert("⚠️ 电话和姓名是必填项！");
            
            // 再次验证手机号格式
            if (!isValidMalaysianPhone(phoneWithoutPrefix)) {
                alert("请输入有效的马来西亚手机号（以0开头，共10-11位数字）");
                return;
            }

            const prayers = document.getElementById("prayersContainer").children;
            const updatedData = Array.from(prayers).map(div => ({
                name: div.querySelector(".pName").value,
                zodiac: div.querySelector(".pZodiac").value,
                taiSui: div.querySelector('input.pTaiSui:checked')?.value || "",
                light: div.querySelector('input.pLight:checked')?.value || "",
                longevity: div.querySelector('input.pLongevity:checked')?.value || "",
                wisdom: div.querySelector('input.pWisdom:checked')?.value || "",
                arhat: div.querySelector('input.pArhat:checked')?.value || "",
                paperGold1: +div.querySelector(".pg1").value || 0,
                paperGold2: +div.querySelector(".pg2").value || 0,
                paperGold3: +div.querySelector(".pg3").value || 0,
                paperGold4: +div.querySelector(".pg4").value || 0,
                paperGold5: +div.querySelector(".pg5").value || 0,
                donation: +div.querySelector(".donate").value || 0
            }));

            const btn = document.querySelector("button[onclick='saveChanges()']");
            btn.innerHTML = "保存中...";
            btn.disabled = true;

            // 构建要提交的数据 - 使用不带前缀的真实手机号
            const submitData = {
                phoneNumber: phoneWithoutPrefix, // 使用不带前缀的手机号提交
                mainName: name,
                data: updatedData,
                receiptNumber: "", // 强制为空
                receiptDate: "",   // 强制为空
                // 用户版：强制清空备注信息，无论原数据是什么
                wishReturn: "",    // 强制清空
                offering: "",      // 强制清空
                wishPaper: ""      // 强制清空
            };

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(submitData)
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    alert("✅ 保存成功！");
                    cancelEdit(); // 保存后返回首页
                } else {
                    alert("❌ 保存失败：" + (result.message || "未知错误"));
                }
            })
            .catch(err => {
                console.error("保存出错:", err);
                alert("网络错误：" + err.message);
            })
            .finally(() => {
                btn.innerHTML = "💾 保存资料";
                btn.disabled = false;
            });
        };

        // 6. 取消编辑（返回首页）
        window.cancelEdit = function() {
            document.getElementById("adminForm").classList.add("hidden");
            document.getElementById("searchResultInfo").classList.add("hidden");
            document.getElementById("resultSelector").classList.add("hidden");
            
            // 清空表单
            document.getElementById("mainName").value = "";
            document.getElementById("phoneNumber").value = "";
            document.getElementById("searchInput").value = "";
            
            // 重置全局变量
            selectedEntry = null;
            fullData = [];
            originalPhoneNumber = null;
            
            // 重置年份选择器为今年
            const yearSelect = document.getElementById("registrationYear");
            yearSelect.value = currentYear;
            currentRegistrationYear = currentYear;
        };

        // === 补全的辅助函数 ===

        // 生成单选框组 - 修改版本，确保水平排列
        function createRadioGroup(name, className, checkedVal) {
            return `
              <div class="form-check d-flex align-items-center justify-content-center">
                <input class="form-check-input ${className}" type="radio" name="${name}" value="是" ${checkedVal === "是" ? "checked" : ""}>
                <label class="form-check-label ms-1" style="font-size: 11px;">是</label>
              </div>
              <div class="form-check d-flex align-items-center justify-content-center">
                <input class="form-check-input ${className}" type="radio" name="${name}" value="" ${!checkedVal ? "checked" : ""}>
                <label class="form-check-label ms-1" style="font-size: 11px;">否</label>
              </div>`;
        }

        // 检查最小数量（防止删光了）
        window.checkMin = function() {
             const container = document.getElementById("prayersContainer");
             if (container.children.length === 0) {
                 container.appendChild(createPrayerBlock({}, 1));
             }
        };

        // === 你提供的完整 createPrayerBlock 函数 ===
        function createPrayerBlock(data = {}, index = 1) {
            const div = document.createElement("div");
            div.className = "prayer-card"; // 使用自定义样式类

            div.innerHTML = `
                <div class="remove-btn" onclick="this.parentElement.remove(); checkMin()">❌</div>
                <div class="mb-2"><strong>🧍‍♂️ 第 ${index} 位祈福者</strong></div>

                <div class="row g-2">
                    <div class="col-6">姓名 <input value="${data.name || ""}" class="form-control pName" style="height:35px" /></div>
                    <div class="col-6">生肖 <input value="${data.zodiac || ""}" class="form-control pZodiac" style="height:35px" /></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-6">太岁 <div class="radio-group">${createRadioGroup(`pTaiSui${index}`, "pTaiSui", data.taiSui)}</div></div>
                    <div class="col-6">纸金1 <input type="number" value="${data.paperGold1 || ""}" class="form-control pg1" style="height:35px" /></div>

                <div class="row g-2 mt-2">
                    <div class="col-6">光明灯 <div class="radio-group">${createRadioGroup(`pLight${index}`, "pLight", data.light)}</div></div>
                    <div class="col-6">纸金2 <input type="number" value="${data.paperGold2 || ""}" class="form-control pg2" style="height:35px" /></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-6">长生禄 <div class="radio-group">${createRadioGroup(`pLongevity${index}`, "pLongevity", data.longevity)}</div></div>
                    <div class="col-6">纸金3 <input type="number" value="${data.paperGold3 || ""}" class="form-control pg3" style="height:35px" /></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-6">文昌 <div class="radio-group">${createRadioGroup(`pWisdom${index}`, "pWisdom", data.wisdom)}</div></div>
                    <div class="col-6">纸金4 <input type="number" value="${data.paperGold4 || ""}" class="form-control pg4" style="height:35px" /></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-6">十六罗汉 <div class="radio-group">${createRadioGroup(`pArhat${index}`, "pArhat", data.arhat)}</div></div>
                    <div class="col-6">纸金5 <input type="number" value="${data.paperGold5 || ""}" class="form-control pg5" style="height:35px" /></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-12">安奉功德金 <input type="number" value="${data.donation || ""}" class="form-control donate" style="height:35px" /></div>
                </div>
            `;

            return div;
        }
    </script>
</body>
