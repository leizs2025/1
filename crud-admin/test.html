<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太岁光明灯登记</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            padding-bottom: 80px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .form-control, .form-select {
            height: 40px;
            font-size: 14px;
            border-radius: 6px;
            background-color: #fff;
        }
        .btn {
            height: 45px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
        }
        .form-control[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
            opacity: 0.8;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            padding: 15px;
            background: #fff;
        }
        .prayer-card {
            position: relative;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .remove-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            color: #dc3545;
            font-size: 20px;
            line-height: 1;
            z-index: 10;
        }
        .form-label {
            font-size: 13px;
            margin-bottom: 2px;
            white-space: nowrap;
        }
        .hidden {
            display: none !important;
        }

        /* --- 核心修改：强制横向排列 --- */
        .radio-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .radio-group .form-check {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 0;
            flex: 1;
        }
        .radio-group .form-check label {
            font-size: 12px;
            width: auto;
            margin-bottom: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h5 class="page-header">🙏 太岁光明灯登记</h5>

    <div class="card">
        <div class="mb-3">
            <input type="text" id="searchInput" class="form-control mb-2" placeholder="输入手机号查询资料" inputmode="tel">
            <button onclick="searchPhone()" class="btn btn-primary w-100 mb-2">🔍 查询资料</button>
            <button onclick="startNewEntry()" class="btn btn-success w-100">➕ 开始登记</button>
        </div>
    </div>

    <div id="resultSelector" class="mb-3"></div>

    <!-- 注意：为了测试，我移除了 hidden 类，页面加载时应该直接看到表单 -->
    <div id="adminForm"> 

        <div class="card">
            <h6 class="border-bottom pb-2 mb-3">📝 基本信息</h6>
            <div class="mb-3">
                <label class="form-label">主家姓名</label>
                <input type="text" id="mainName" class="form-control" placeholder="姓名">
            </div>
            <div class="mb-3">
                <label class="form-label">手机号码</label>
                <input type="tel" id="phoneNumber" class="form-control" placeholder="用于查询" inputmode="tel" readonly>
            </div>
        </div>

        <div class="card">
            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                <h6 class="m-0">🙏 祈福者名单</h6>
                <button onclick="addPrayer()" class="btn btn-sm btn-outline-primary">+ 添加</button>
            </div>
            <div id="prayersContainer">
                <!-- 这里将显示祈福者 -->
            </div>
        </div>

        <div class="d-grid gap-2 mb-5">
            <button onclick="saveChanges()" class="btn btn-danger btn-lg">💾 保存资料</button>
            <button onclick="document.getElementById('adminForm').classList.add('hidden')" class="btn btn-secondary">取消</button>
        </div>
    </div>

    <script>
        const API_URL = "https://lucky-cloud-f9c3.gealarm2012.workers.dev";
        let fullData = [];
        let selectedEntry = null;

        // 1. 查询功能 (为了测试，先注释掉复杂的逻辑，直接强制显示表单)
        window.searchPhone = function () {
            // 简化逻辑：直接显示表单，看名单能不能出来
            document.getElementById("adminForm").classList.remove("hidden");
            // 这里强制添加一个祈福者用于测试
            const container = document.getElementById("prayersContainer");
            container.innerHTML = "";
            container.appendChild(createPrayerBlock({name: "测试张三", zodiac: "龙"}, 1));
            console.log("执行了 searchPhone，尝试渲染名单");
        };

        // 2. 开始新登记 (已修改：强制显示并添加数据)
        window.startNewEntry = function () {
            console.log("执行了 startNewEntry");
            document.getElementById("adminForm").classList.remove("hidden");
            document.getElementById("adminForm").scrollIntoView({ behavior: 'smooth' });
            
            // 清空旧数据
            document.getElementById("prayersContainer").innerHTML = "";
            
            // 强制添加一个默认的祈福者
            addPrayer();
        };

        // 3. 添加祈福者
        window.addPrayer = function () {
            const container = document.getElementById("prayersContainer");
            console.log("当前祈福者数量:", container.children.length);
            if (container.children.length >= 15) return alert("最多添加 15 位！");
            
            // 添加一个新的祈福者
            container.appendChild(createPrayerBlock({}, container.children.length + 1));
            console.log("添加了一位祈福者");
        };

        // 4. 渲染表单数据 (暂未使用，先不管)
        function renderForm() {
            // 留空或调试用
        }

        // 5. 保存资料 (暂未完善)
        window.saveChanges = function () {
            alert("保存功能暂未启用，先测试显示");
        };

        // === 关键修复：使用数组拼接 HTML，防止截断 ===
        function createPrayerBlock(data = {}, index = 1) {
            // 使用数组来构建 HTML 字符串，避免长字符串被截断
            const lines = [];
            lines.push('<div class="remove-btn" onclick="this.parentElement.remove(); checkMin()">❌</div>');
            lines.push('<div class="mb-2"><strong>🧍‍♂️ 第 ' + index + ' 位祈福者</strong></div>');
            lines.push('<div class="row g-2">');
            lines.push('  <div class="col-6">姓名 <input value="' + (data.name || "") + '" class="form-control pName" style="height:35px" /></div>');
            lines.push('  <div class="col-6">生肖 <input value="' + (data.zodiac || "") + '" class="form-control pZodiac" style="height:35px" /></div>');
            lines.push('</div>');
            lines.push('<div class="row g-2 mt-2">');
            lines.push('  <div class="col-6">太岁 ' + createRadioGroup(`pTaiSui${index}`, "pTaiSui", data.taiSui) + '</div>');
            lines.push('  <div class="col-6">纸金1 <input type="number" value="' + (data.paperGold1 || "") + '" class="form-control pg1" style="height:35px" /></div>');
            lines.push('</div>');
            lines.push('<div class="row g-2 mt-2">');
            lines.push('  <div class="col-6">光明灯 ' + createRadioGroup(`pLight${index}`, "pLight", data.light) + '</div>');
            lines.push('  <div class="col-6">纸金2 <input type="number" value="' + (data.paperGold2 || "") + '" class="form-control pg2" style="height:35px" /></div>');
            lines.push('</div>');

            const div = document.createElement("div");
            div.className = "prayer-card";
            div.innerHTML = lines.join("");
            return div;
        }

        // 生成单选框组
        function createRadioGroup(name, className, checkedVal) {
            return `
                <div class="form-check">
                    <input class="form-check-input ${className}" type="radio" name="${name}" value="是" ${checkedVal === "是" ? "checked" : ""}>
                    <label class="form-check-label">是</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input ${className}" type="radio" name="${name}" value="" ${!checkedVal ? "checked" : ""}>
                    <label class="form-check-label">否</label>
                </div>`;
        }

        // 检查最小数量
        window.checkMin = function() {
            const container = document.getElementById("prayersContainer");
            if (container.children.length === 0) {
                console.log("检测到数量为0，自动添加一个");
                container.appendChild(createPrayerBlock({}, 1));
            }
        };

        // 页面加载完成后，自动执行 startNewEntry，确保你一打开就能看到名单
        document.addEventListener("DOMContentLoaded", function() {
            startNewEntry();
        });

    </script>
</body>
</html>
